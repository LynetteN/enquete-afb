# Netlify Deployment Configuration
# This file configures how your app is deployed to Netlify

[build]
  # Build command
  command = "npm run build"

  # Publish directory
  publish = "dist"

  # Build environment variables
  [build.environment]
    NODE_VERSION = "18"

# Redirects for SPA (Single Page Application) support
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache headers for static assets
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables (can also be set in Netlify dashboard)
[context.production.environment]
  VITE_APP_MODE = "production"
  VITE_API_URL = "http://34.95.39.11:3001/api"
  VITE_ENABLE_SHAREPOINT_SYNC = "true"
  VITE_ENABLE_OFFLINE_MODE = "true"
  VITE_ENABLE_DIAGNOSTICS = "false"

[context.deploy-preview.environment]
  VITE_APP_MODE = "staging"
  VITE_ENABLE_SHAREPOINT_SYNC = "true"
  VITE_ENABLE_OFFLINE_MODE = "true"
  VITE_ENABLE_DIAGNOSTICS = "true"

[context.branch-deploy.environment]
  VITE_APP_MODE = "staging"
  VITE_ENABLE_SHAREPOINT_SYNC = "true"
  VITE_ENABLE_OFFLINE_MODE = "true"
  VITE_ENABLE_DIAGNOSTICS = "true"

# Plugins
[[plugins]]
  package = "@netlify/plugin-lighthouse"

# Functions (if you need server-side functions)
[functions]
  directory = "netlify/functions"