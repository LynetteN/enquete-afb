# Docker PostgreSQL Security Configuration
# This file contains PostgreSQL security settings

# Connection Security
# Require SSL for all connections (uncomment for production)
# ssl=on
# ssl_cert_file=/var/lib/postgresql/data/server.crt
# ssl_key_file=/var/lib/postgresql/data/server.key
# ssl_ca_file=/var/lib/postgresql/data/ca.crt

# Authentication Security
# Use SCRAM-SHA-256 for password encryption
password_encryption=scram-sha-256

# Connection Limits
max_connections=100
superuser_reserved_connections=3

# Resource Limits
shared_buffers=256MB
effective_cache_size=1GB
maintenance_work_mem=64MB
checkpoint_completion_target=0.9
wal_buffers=16MB
default_statistics_target=100
random_page_cost=1.1
effective_io_concurrency=200
work_mem=2621kB
min_wal_size=1GB
max_wal_size=4GB

# Security Settings
# Prevent unauthorized access
# listen_addresses='localhost'  # Uncomment to only listen on localhost

# Logging and Monitoring
log_destination='stderr'
logging_collector=on
log_directory='/var/log/postgresql'
log_filename='postgresql-%Y-%m-%d_%H%M%S.log'
log_min_messages=WARNING
log_min_error_statement=ERROR
log_connections=on
log_disconnections=on
log_statement=mod
log_duration=on
log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_lock_waits=on

# Performance Monitoring
shared_preload_libraries='pg_stat_statements'
pg_stat_statements.max=10000
pg_stat_statements.track=all

# Security: Timeouts
statement_timeout=300000
lock_timeout=30000
idle_in_transaction_session_timeout=60000
idle_in_transaction_session_timeout=60000

# Security: Prevent DoS attacks
temp_file_limit=1073741824
work_mem=262144

# Security: Prevent privilege escalation
# superuser_reserved_connections=3

# Security: Prevent information disclosure
# client_min_messages=NOTICE